baseURL: "https://ksorok.in"
languageCode: "en-us"
title: "ksorok.in — Code, Life & Things I Enjoy"
theme: ["PaperMod"]

markup:
  highlight:
    style: monokai  # или dracula, solarized-dark и т.п.
    noClasses: false
    guessSyntax:  true      # Автоопределение языка
    lineNos: true          # Нумерация строк (если нужна)
    lineNumbersInTable: true
  goldmark:
    renderer:
      unsafe: true

pygmentsUseClasses: true
pygmentsCodeFences: true
pygmentsStyle: monokai

pagination:
  pagerSize: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  label:
    text: "ksorok.in"
  env: "production"
  productionURL: "https://ksorok.in/"
  defaultTheme: "light"
  disableThemeToggle: false
  ShowRssButtonInSectionTermList: true
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  comments: true
  ShowToc: false
  hideFooter: false
  hideSummary: false
  description: Personal blog by Kostiantyn Sorokin — indie app dev, MVP builder, retro gaming, and real notes from building startups and side projects.

  assets:
    customCSS:
      - "/css/extended/theme-vars-override.css"
      - "/css/extended/chroma.css"
    externalLinksInNewTab: true
    umamiWebsiteId: "d1f72a89-bede-4cb3-a1be-edf59177d826"  # ← вставь сюда ID сайта из Umami
    umamiScriptUrl: "https://analytics.umami.is/script.js"

  homeInfoParams:
    Title: '<span class="home-prompt">[~]$ whoami<span class="cursor"></span></span>'
    Content: |
      <p>This is my personal space — no strict niche, just things that catch my attention. Apps I'm building, gadgets I picked up, movies I watched, stuff I figured out the hard way. If that sounds like your kind of content — you're in the right place. <a href="/about/" class="home-intro-link group inline-flex items-center gap-1 underline decoration-dashed underline-offset-4">Read more</a></p>
      <div class="flex flex-nowrap items-center gap-1 whitespace-nowrap">
          <div class="me-2 mb-0 whitespace-nowrap">Social Links:</div>
          <a href="https://www.instagram.com/ksorok.in/" title="Instagram" aria-label="Instagram" class="group inline-flex items-center gap-1 hover:text-accent p-2 hover:rotate-6 sm:p-1" target="_blank" rel="noopener noreferrer">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="inline-block size-6 scale-125 fill-transparent stroke-current stroke-2 opacity-90 group-hover:fill-transparent sm:scale-110" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"></path><path d="M4 4m0 4a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4z"></path><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"></path><path d="M16.5 7.5l0 .01"></path></svg>
            <span class="sr-only">Instagram</span>
          </a>
          <a href="mailto:contact@ksorok.in" title="Email" aria-label="Email" class="group inline-flex items-center gap-1 hover:text-accent p-2 hover:rotate-6 sm:p-1">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="inline-block size-6 scale-125 fill-transparent stroke-current stroke-2 opacity-90 group-hover:fill-transparent sm:scale-110" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"></path><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="m3 7 9 6 9-6"></path></svg>
            <span class="sr-only">Email</span>
          </a>
          <a href="https://www.linkedin.com/in/kirpokik/" title="LinkedIn" aria-label="LinkedIn" class="group inline-flex items-center gap-1 hover:text-accent p-2 hover:rotate-6 sm:p-1" target="_blank" rel="noopener noreferrer">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="inline-block size-6 scale-125 fill-transparent stroke-current stroke-2 opacity-90 group-hover:fill-transparent sm:scale-110" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"></path><path d="M8 11v5M8 8v.01M12 16v-5M16 16v-3a2 2 0 1 0-4 0"></path><path d="M3 7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"></path></svg>
            <span class="sr-only">LinkedIn</span>
          </a>
      </div>

mainSections:
  - posts
  - build-log

taxonomies:
  category: categories
  tag: tags

profileMode:
  enabled: false

menu:
  main:
    - name: "About"
      url: "/about/"
      weight: 1
    - name: "Blog"
      url: "/posts/"
      weight: 2
    - name: "Notes"
      url: "/notes/"
      weight: 3
    - name: "Dev"
      url: "/dev/"
      weight: 4
    - name: "Tags"
      url: "/tags/"
      weight: 5
    - name: "Search"
      url: "/search/"
      weight: 6
